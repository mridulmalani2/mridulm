        *, *::before, *::after {

        :root {

            color: #ffffff;

        }

            scrollbar-width: none;
        }

        .text-fluid-h2 {

            line-height: 1.1;
        }
        .text-fluid-body {
            font-size: clamp(0.9rem, 2vw, 1.25rem);
        }

        .page-container {
            width: 100%;
            max-width: var(--container-max-width);
            margin: 0 auto;
            padding-left: var(--spacing-unit);
            padding-right: var(--spacing-unit);
        }

        .section-v-padding {
            padding-top: clamp(4rem, 12vh, 12rem);
            padding-bottom: clamp(4rem, 12vh, 12rem);
        }

        .perspective-main {
            perspective: 2000px;
        }

        /* Radial gradient background */
        .bg-gradient-radial {
            background: radial-gradient(ellipse at center, var(--tw-gradient-from) 0%, var(--tw-gradient-via) 40%, var(--tw-gradient-to) 100%);
        }

        /* Focus indicators */
        *:focus-visible {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
        }

        button:focus-visible,
        a:focus-visible {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Screen reader only utility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        .sr-only.focus\:not-sr-only:focus {
            position: static;
            width: auto;
            height: auto;
            padding: inherit;
            margin: inherit;
            overflow: visible;
            clip: auto;
            white-space: normal;
        }
